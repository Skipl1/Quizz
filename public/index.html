<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QUIZZ — Игровая платформа</title>

    <!-- CSS: Theme → Common → Index -->
    <link rel="stylesheet" href="/css/theme.css" />
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/css/index-main.css" />
    <link rel="stylesheet" href="/css/index-question.css" />
    <link rel="stylesheet" href="/css/index-leaderboard.css" />
    <link rel="stylesheet" href="/css/index-responsive.css" />
  </head>
  <body>
    <nav>
      <div class="logo">QUIZZ<span>.</span></div>
      <a href="/admin.html" class="secondary-action">Панель ведущего →</a>
    </nav>

    <div class="main-card">
      <!-- Экран входа -->
      <div id="login-screen" class="screen active">
        <h1>Присоединяйся</h1>
        <p>Введи имя, чтобы начать игру</p>

        <div class="input-group">
          <input
            type="text"
            id="player-name"
            placeholder="Ваше имя"
            maxlength="20"
          />
        </div>

        <button class="btn" onclick="register()">Войти в игру</button>
        <p
          id="restore-status"
          style="color: var(--success); margin-top: 1rem; display: none"
        ></p>
      </div>

      <!-- Экран ожидания -->
      <div id="waiting-screen" class="screen">
        <h1>Ожидание</h1>
        <div class="player-info">
          <span class="player-name" id="display-name"></span>
          <span id="restored-badge" class="restored-badge" style="display: none"
            >Восстановлено</span
          >
        </div>
        <div class="waiting">
          <div class="spinner"></div>
          <p id="waiting-text">Ожидание начала викторины...</p>
        </div>
      </div>

      <!-- Экран вопроса -->
      <div id="question-screen" class="screen">
        <div class="question-number" id="question-number">Вопрос 1 из 4</div>
        <span class="question-type-badge" id="question-type-badge"
          >Множественный выбор</span
        >

        <div class="timer-text" id="timer-text">30</div>
        <div class="timer-bar">
          <div class="timer-fill" id="timer-fill"></div>
        </div>

        <img id="question-image" class="question-image" alt="К вопросу" />
        <div class="question-text" id="question-text">Текст вопроса</div>

        <p class="answer-hint" id="answer-hint"></p>

        <!-- Multiple Choice -->
        <div class="options" id="options-container"></div>
        <button
          class="btn submit-answer-btn"
          id="submit-mc-btn"
          onclick="submitMultipleChoiceFinal()"
          style="display: none; margin-top: 1rem"
        >
          Ответить
        </button>

        <!-- True/False -->
        <div
          class="true-false-container"
          id="tf-container"
          style="display: none"
        >
          <button class="tf-btn true" onclick="selectTFAnswer(0)">
            Правда
          </button>
          <button class="tf-btn false" onclick="selectTFAnswer(1)">Ложь</button>
        </div>
        <button
          class="btn submit-answer-btn"
          id="submit-tf-btn"
          onclick="submitTFFinal()"
          style="display: none; margin-top: 1rem"
        >
          Ответить
        </button>

        <!-- Text Answer -->
        <div
          class="text-answer-container"
          id="text-answer-container"
          style="display: none"
        >
          <input
            type="text"
            class="text-answer-input"
            id="text-answer-input"
            placeholder="Введите ваш ответ..."
          />
          <button class="btn submit-answer-btn" onclick="submitTextFinal()">
            Ответить
          </button>
        </div>

        <!-- Ordering -->
        <ul class="ordering-list" id="ordering-list"></ul>
        <button
          class="btn submit-order-btn"
          id="submit-order-btn"
          onclick="submitOrderingFinal()"
          style="display: none"
        >
          Ответить
        </button>

        <!-- Matching -->
        <div
          class="matching-drag-container"
          id="matching-container"
          style="display: none"
        >
          <div class="matching-column" id="matching-left"></div>
          <div class="matching-column" id="matching-right"></div>
        </div>
        <button
          class="btn submit-answer-btn"
          id="submit-matching-btn"
          onclick="submitMatchingFinal()"
          style="display: none; margin-top: 1rem"
        >
          Ответить
        </button>

        <div id="time-up" class="time-up-message">Время вышло!</div>
        <p class="loading-next" id="loading-next">
          Загрузка следующего вопроса...
        </p>
      </div>

      <!-- Экран окончания -->
      <div id="end-screen" class="screen">
        <h1>Итоги игры</h1>
        <div
          class="player-info"
          style="margin: 1.5rem 0; flex-direction: column; gap: 0.75rem"
        >
          <span>Ваш результат:</span>
          <span class="final-score" id="final-score">0</span>
          <span class="player-score" style="font-size: 1rem">баллов</span>
        </div>
        <h2 style="margin-bottom: 1rem; font-size: 1.1rem">
          Финальный рейтинг:
        </h2>
        <div id="final-leaderboard"></div>
        <button
          class="btn"
          onclick="clearSession(); location.reload()"
          style="margin-top: 1.5rem"
        >
          Играть снова
        </button>
      </div>
    </div>

    <!-- JS: Socket.IO → Utils → Index modules -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
      // Инициализация Socket.IO (должна быть до всех модулей)
      const socket = io();
    </script>
    <script src="/js/utils.js"></script>
    <script src="/js/index-state.js"></script>
    <script src="/js/index-registration.js"></script>
    <script src="/js/index-timer.js"></script>
    <script src="/js/index-questions.js"></script>
    <script src="/js/index-submit.js"></script>
    <script src="/js/index-sockets.js"></script>
    <script src="/js/index-init.js"></script>
  </body>
</html>
