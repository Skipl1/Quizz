<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Викторина</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 20px;
        padding: 40px;
        max-width: 600px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        text-align: center;
      }
      h1 {
        color: #333;
        margin-bottom: 30px;
        font-size: 2rem;
      }
      .screen {
        display: none;
      }
      .screen.active {
        display: block;
      }

      input[type="text"] {
        width: 100%;
        padding: 15px;
        border: 2px solid #ddd;
        border-radius: 10px;
        font-size: 1rem;
        margin-bottom: 20px;
        transition: border-color 0.3s;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: #667eea;
      }

      button {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px 40px;
        border-radius: 10px;
        font-size: 1.1rem;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }

      .question-number {
        color: #999;
        font-size: 0.9rem;
        margin-bottom: 10px;
      }
      .question-text {
        font-size: 1.4rem;
        color: #333;
        margin-bottom: 20px;
        font-weight: 600;
        line-height: 1.4;
      }

      .timer-bar {
        width: 100%;
        height: 8px;
        background: #e0e0e0;
        border-radius: 4px;
        margin-bottom: 15px;
        overflow: hidden;
      }
      .timer-fill {
        height: 100%;
        background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
        width: 100%;
        transition: width 1s linear;
      }
      .timer-fill.warning {
        background: linear-gradient(90deg, #f39c12 0%, #d68910 100%);
      }
      .timer-fill.danger {
        background: linear-gradient(90deg, #e74c3c 0%, #c0392b 100%);
      }

      .timer-text {
        font-size: 2rem;
        font-weight: bold;
        color: #667eea;
        margin-bottom: 15px;
      }

      .question-image {
        max-width: 100%;
        max-height: 250px;
        border-radius: 10px;
        margin-bottom: 20px;
        display: none;
        object-fit: contain;
      }
      .question-image.show {
        display: block;
      }

      /* Multiple Choice Options */
      .options {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .option-btn {
        background: #f5f5f5;
        color: #333;
        padding: 18px 20px;
        border: 2px solid #e0e0e0;
        text-align: left;
        font-size: 1rem;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .option-btn:hover:not(:disabled) {
        background: #e8e8e8;
        border-color: #667eea;
      }
      .option-btn.selected {
        background: #667eea;
        color: white;
        border-color: #667eea;
      }
      .option-btn.multi-selectable {
        position: relative;
      }
      .option-btn.multi-selected {
        background: #27ae60;
        color: white;
        border-color: #27ae60;
      }

      /* True/False */
      .true-false-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin: 20px 0;
      }
      .tf-btn {
        padding: 40px 20px;
        border: 3px solid #e0e0e0;
        border-radius: 15px;
        font-size: 1.2rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        background: white;
      }
      .tf-btn:hover:not(:disabled) {
        transform: translateY(-3px);
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      }
      .tf-btn.true {
        border-color: #27ae60;
        color: #27ae60;
      }
      .tf-btn.false {
        border-color: #e74c3c;
        color: #e74c3c;
      }
      .tf-btn.selected {
        color: white;
      }
      .tf-btn.true.selected {
        background: #27ae60;
        border-color: #27ae60;
      }
      .tf-btn.false.selected {
        background: #e74c3c;
        border-color: #e74c3c;
      }

      /* Text Answer */
      .text-answer-container {
        margin: 20px 0;
      }
      .text-answer-input {
        width: 100%;
        padding: 20px;
        border: 2px solid #ddd;
        border-radius: 12px;
        font-size: 1.1rem;
        font-family: inherit;
        margin-bottom: 15px;
      }
      .text-answer-input:focus {
        outline: none;
        border-color: #667eea;
      }

      /* Submit button for text answers */
      .submit-answer-btn {
        background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
        width: 100%;
        padding: 18px;
        font-size: 1.1rem;
        font-weight: 600;
      }

      .waiting {
        color: #666;
        font-size: 1.2rem;
        padding: 40px 0;
      }
      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #667eea;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .player-info {
        background: #f9f9f9;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .player-name {
        font-weight: 600;
        color: #667eea;
      }
      .player-score {
        font-weight: bold;
        color: #667eea;
        background: white;
        padding: 5px 15px;
        border-radius: 20px;
      }

      .leaderboard-mini {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 2px solid #eee;
      }
      .leaderboard-mini h3 {
        color: #999;
        font-size: 1rem;
        margin-bottom: 10px;
      }
      .leaderboard-item {
        display: flex;
        justify-content: space-between;
        padding: 8px 15px;
        background: #f9f9f9;
        border-radius: 8px;
        margin-bottom: 5px;
        font-size: 0.9rem;
      }
      .leaderboard-item .rank {
        font-weight: bold;
        color: #667eea;
      }
      .leaderboard-item .score {
        font-weight: bold;
        color: #667eea;
      }

      .time-up-message {
        background: #f8d7da;
        color: #721c24;
        padding: 15px;
        border-radius: 10px;
        margin-top: 15px;
        font-weight: 600;
        display: none;
      }

      .loading-next {
        margin-top: 15px;
        color: #999;
        font-size: 0.95rem;
        display: none;
      }

      .restored-badge {
        background: #27ae60;
        color: white;
        padding: 5px 12px;
        border-radius: 15px;
        font-size: 0.8rem;
        margin-left: 10px;
      }

      /* Live рейтинг */
      .live-leaderboard {
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px solid #eee;
      }
      .live-leaderboard h4 {
        color: #999;
        font-size: 0.85rem;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 5px;
        justify-content: center;
      }
      .live-dot {
        width: 8px;
        height: 8px;
        background: #27ae60;
        border-radius: 50%;
        animation: pulse-live 2s infinite;
      }
      @keyframes pulse-live {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }
      .live-leaderboard-item {
        display: flex;
        justify-content: space-between;
        padding: 6px 12px;
        background: #f9f9f9;
        border-radius: 6px;
        margin-bottom: 4px;
        font-size: 0.85rem;
      }
      .live-leaderboard-item .rank {
        color: #667eea;
        font-weight: bold;
        margin-right: 8px;
      }
      .live-leaderboard-item .name {
        flex: 1;
      }
      .live-leaderboard-item .score {
        color: #667eea;
        font-weight: bold;
      }
      .live-leaderboard-item.my-score {
        background: #e8f4fd;
        border: 1px solid #667eea;
      }

      .question-type-badge {
        display: inline-block;
        background: #f0f4ff;
        color: #667eea;
        padding: 5px 12px;
        border-radius: 15px;
        font-size: 0.8rem;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Экран входа -->
      <div id="login-screen" class="screen active">
        <h1>🎮 Викторина</h1>
        <input
          type="text"
          id="player-name"
          placeholder="Введите ваше имя"
          maxlength="20"
        />
        <button onclick="register()">Войти в игру</button>
        <p
          id="restore-status"
          style="color: #27ae60; margin-top: 15px; display: none"
        >
          🔄 Восстановление сессии...
        </p>
      </div>

      <!-- Экран ожидания -->
      <div id="waiting-screen" class="screen">
        <h1>🎮 Викторина</h1>
        <div class="player-info">
          <div>
            <span
              >Игрок: <strong class="player-name" id="display-name"></strong
            ></span>
            <span
              id="restored-badge"
              class="restored-badge"
              style="display: none"
              >Восстановлено</span
            >
          </div>
          <span class="player-score" id="display-score">0 бал.</span>
        </div>
        <div class="waiting">
          <div class="spinner"></div>
          <p id="waiting-text">Ожидание начала викторины...</p>
        </div>
        <div class="leaderboard-mini" id="mini-leaderboard"></div>
      </div>

      <!-- Экран вопроса -->
      <div id="question-screen" class="screen">
        <div class="question-number" id="question-number">Вопрос 1 из 4</div>
        <span class="question-type-badge" id="question-type-badge"
          >Множественный выбор</span
        >

        <div class="timer-text" id="timer-text">30</div>
        <div class="timer-bar">
          <div class="timer-fill" id="timer-fill"></div>
        </div>

        <img id="question-image" class="question-image" alt="К вопросу" />
        <div class="question-text" id="question-text">Текст вопроса</div>

        <!-- Multiple Choice -->
        <div class="options" id="options-container"></div>

        <!-- True/False -->
        <div
          class="true-false-container"
          id="tf-container"
          style="display: none"
        >
          <button class="tf-btn true" onclick="submitTF(0)">✅ Правда</button>
          <button class="tf-btn false" onclick="submitTF(1)">❌ Ложь</button>
        </div>

        <!-- Text Answer -->
        <div
          class="text-answer-container"
          id="text-answer-container"
          style="display: none"
        >
          <input
            type="text"
            class="text-answer-input"
            id="text-answer-input"
            placeholder="Введите ваш ответ..."
          />
          <button class="btn submit-answer-btn" onclick="submitTextAnswer()">
            ✅ Отправить ответ
          </button>
        </div>

        <div id="time-up" class="time-up-message">⏰ Время вышло!</div>
        <p class="loading-next" id="loading-next">
          ⏳ Загрузка следующего вопроса...
        </p>

        <!-- Live рейтинг -->
        <div class="live-leaderboard" id="question-leaderboard">
          <h4><span class="live-dot"></span> Рейтинг</h4>
          <div id="live-leaderboard-content"></div>
        </div>
      </div>

      <!-- Экран окончания -->
      <div id="end-screen" class="screen">
        <h1>🏆 Викторина завершена!</h1>
        <div class="player-info" style="margin: 20px 0">
          <span>Ваш результат:</span>
          <span class="player-score" id="final-score" style="font-size: 1.2rem"
            >0 бал.</span
          >
        </div>
        <h2 style="margin-bottom: 20px">Итоговый рейтинг:</h2>
        <div id="final-leaderboard"></div>
        <button
          class="btn"
          onclick="location.reload()"
          style="margin-top: 20px"
        >
          🔄 Заново
        </button>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      let playerName = "";
      let playerScore = 0;
      let hasAnswered = false;
      let timerInterval = null;
      let currentQuestionType = "multiple_choice";
      let multiSelectAnswers = [];
      const QUESTION_TIME = 30;
      const STORAGE_KEY = "quiz_player_session";

      function showScreen(id) {
        document
          .querySelectorAll(".screen")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }

      function register(savedData = null) {
        const input = document.getElementById("player-name");

        if (savedData) {
          document.getElementById("restore-status").style.display = "block";
          socket.emit("register", {
            name: savedData.name,
            savedId: savedData.playerId,
          });
        } else {
          const name = input.value.trim();
          if (!name) {
            alert("Введите имя!");
            return;
          }
          playerName = name;
          socket.emit("register", name);
        }
      }

      function checkSavedSession() {
        const saved = sessionStorage.getItem(STORAGE_KEY);
        if (saved) {
          try {
            const data = JSON.parse(saved);
            register(data);
          } catch (e) {
            sessionStorage.removeItem(STORAGE_KEY);
          }
        }
      }

      socket.on("registered", (data) => {
        playerName = data.name;
        document.getElementById("display-name").textContent = data.name;

        if (data.restored) {
          document.getElementById("restored-badge").style.display = "inline";
          document.getElementById("restore-status").textContent =
            "✅ Сессия восстановлена!";
        }

        sessionStorage.setItem(
          STORAGE_KEY,
          JSON.stringify({
            playerId: data.playerId,
            name: data.name,
          }),
        );

        showScreen("waiting-screen");
      });

      socket.on("quiz-already-started", () => {
        alert("Викторина уже запущена! Подключиться нельзя.");
        sessionStorage.removeItem(STORAGE_KEY);
        location.reload();
      });

      socket.on("quiz-ready", (data) => {
        document.getElementById("waiting-text").textContent =
          `Викторина "${data.name}" готова! Ожидание запуска...`;
      });

      socket.on("new-question", (data) => {
        hasAnswered = false;
        multiSelectAnswers = [];
        document.getElementById("time-up").style.display = "none";
        document.getElementById("loading-next").style.display = "none";
        document.getElementById("question-number").textContent =
          `Вопрос ${data.questionIndex} из ${data.totalQuestions}`;
        document.getElementById("question-text").textContent = data.text;
        currentQuestionType = data.type || "multiple_choice";

        // Тип вопроса
        const typeNames = {
          multiple_choice: "Множественный выбор",
          true_false: "Правда/Ложь",
          fill_blank: "Заполнить пробел",
          open_ended: "Открытый вопрос",
        };
        document.getElementById("question-type-badge").textContent =
          typeNames[data.type] || "Вопрос";

        // Картинка
        const img = document.getElementById("question-image");
        if (data.image) {
          img.src = data.image;
          img.classList.add("show");
        } else {
          img.classList.remove("show");
        }

        // Скрыть все контейнеры
        document.getElementById("options-container").innerHTML = "";
        document.getElementById("options-container").style.display = "none";
        document.getElementById("tf-container").style.display = "none";
        document.getElementById("text-answer-container").style.display = "none";

        // Показать нужный тип
        if (data.type === "multiple_choice") {
          renderMultipleChoice(data.options);
        } else if (data.type === "true_false") {
          document.getElementById("tf-container").style.display = "grid";
        } else if (data.type === "fill_blank" || data.type === "open_ended") {
          document.getElementById("text-answer-container").style.display =
            "block";
          document.getElementById("text-answer-input").value = "";
          document.getElementById("text-answer-input").placeholder =
            data.type === "fill_blank"
              ? "Введите пропущенное слово..."
              : "Введите развёрнутый ответ...";
        }

        startTimer(data.timeLeft || QUESTION_TIME);
        showScreen("question-screen");
      });

      function renderMultipleChoice(options) {
        const container = document.getElementById("options-container");
        container.style.display = "flex";

        options.forEach((option, index) => {
          const btn = document.createElement("button");
          btn.className = "option-btn";
          btn.textContent = option;
          btn.onclick = () => submitMultipleChoice(index, btn);
          container.appendChild(btn);
        });
      }

      function startTimer(timeLeft) {
        if (timerInterval) clearInterval(timerInterval);

        const timerText = document.getElementById("timer-text");
        const timerFill = document.getElementById("timer-fill");

        timerFill.classList.remove("warning", "danger");
        timerFill.style.width = "100%";

        let remaining = timeLeft;
        timerText.textContent = remaining;

        timerInterval = setInterval(() => {
          remaining--;
          timerText.textContent = remaining;

          const percent = (remaining / timeLeft) * 100;
          timerFill.style.width = percent + "%";

          if (remaining <= 10 && remaining > 5) {
            timerFill.classList.add("warning");
          } else if (remaining <= 5) {
            timerFill.classList.add("danger");
          }

          if (remaining <= 0) {
            clearInterval(timerInterval);
            timeUp();
          }
        }, 1000);
      }

      function timeUp() {
        document.getElementById("time-up").style.display = "block";
        disableAllInputs();
        socket.emit("time-up");
      }

      function disableAllInputs() {
        document
          .querySelectorAll(".option-btn")
          .forEach((b) => (b.disabled = true));
        document
          .querySelectorAll(".tf-btn")
          .forEach((b) => (b.disabled = true));
        document.getElementById("text-answer-input").disabled = true;
        document
          .querySelectorAll(".submit-answer-btn")
          .forEach((b) => (b.disabled = true));
      }

      // Multiple Choice
      function submitMultipleChoice(index, btn) {
        if (hasAnswered) return;
        hasAnswered = true;

        document
          .querySelectorAll(".option-btn")
          .forEach((b) => (b.disabled = true));
        btn.classList.add("selected");
        document.getElementById("loading-next").style.display = "block";

        socket.emit("submit-answer", index);
      }

      // True/False
      function submitTF(answer) {
        if (hasAnswered) return;
        hasAnswered = true;

        document
          .querySelectorAll(".tf-btn")
          .forEach((b) => (b.disabled = true));
        document.querySelectorAll(".tf-btn")[answer].classList.add("selected");
        document.getElementById("loading-next").style.display = "block";

        socket.emit("submit-answer", answer);
      }

      // Text Answer
      function submitTextAnswer() {
        if (hasAnswered) return;

        const input = document.getElementById("text-answer-input");
        const answer = input.value.trim();

        if (!answer) {
          alert("Введите ответ!");
          return;
        }

        hasAnswered = true;
        input.disabled = true;
        document.querySelector(".submit-answer-btn").disabled = true;
        document.getElementById("loading-next").style.display = "block";

        // Для текстовых ответов отправляем текст
        socket.emit("submit-answer", { type: "text", answer: answer });
      }

      socket.on("update-leaderboard", (leaderboard) => {
        const myEntry = leaderboard.find((p) => p.name === playerName);
        if (myEntry) {
          playerScore = myEntry.score;
          document.getElementById("display-score").textContent =
            `${playerScore} бал.`;
        }

        const miniBoard = document.getElementById("mini-leaderboard");
        if (leaderboard.length > 0) {
          miniBoard.innerHTML = `
          <h3>📊 Рейтинг</h3>
          ${leaderboard
            .slice(0, 5)
            .map(
              (p, i) => `
            <div class="leaderboard-item">
              <span><span class="rank">#${i + 1}</span> ${escapeHtml(p.name)}</span>
              <span class="score">${p.score}</span>
            </div>
          `,
            )
            .join("")}
        `;
        }

        const liveBoard = document.getElementById("live-leaderboard-content");
        if (liveBoard && leaderboard.length > 0) {
          liveBoard.innerHTML = leaderboard
            .slice(0, 5)
            .map(
              (p, i) => `
            <div class="live-leaderboard-item ${p.name === playerName ? "my-score" : ""}">
              <span><span class="rank">#${i + 1}</span> ${escapeHtml(p.name)}</span>
              <span class="score">${p.score}</span>
            </div>
          `,
            )
            .join("");
        }
      });

      socket.on("player-quiz-ended", (data) => {
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById("final-score").textContent =
          `${data.score} бал.`;
        socket.emit("get-final-leaderboard");
      });

      socket.on("final-leaderboard", (leaderboard) => {
        const container = document.getElementById("final-leaderboard");
        container.innerHTML = leaderboard
          .map(
            (player, i) => `
        <div style="padding: 15px; margin: 10px 0; background: #f5f5f5; border-radius: 10px; display: flex; justify-content: space-between; align-items: center;">
          <span><strong>${i + 1}.</strong> ${escapeHtml(player.name)}</span>
          <span style="color: #667eea; font-weight: bold;">${player.score} бал.</span>
        </div>
      `,
          )
          .join("");

        showScreen("end-screen");
        sessionStorage.removeItem(STORAGE_KEY);
      });

      socket.on("quiz-stopped", () => {
        if (timerInterval) clearInterval(timerInterval);
        document.getElementById("time-up").style.display = "none";
        document.getElementById("waiting-text").textContent =
          "Викторина остановлена ведущим. Ожидание...";
        showScreen("waiting-screen");
      });

      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      checkSavedSession();
    </script>
  </body>
</html>
